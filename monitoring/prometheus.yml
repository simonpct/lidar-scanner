global:
  scrape_interval: 15s

scrape_configs:
  # Scrape le Pi directement quand accessible
  - job_name: "lidar-pi-node"
    scrape_interval: 15s
    scrape_timeout: 5s
    static_configs:
      - targets: ["lidar-scanner.local:9100"]
        labels:
          host: "rpi5"

  - job_name: "lidar-pi-dashboard"
    scrape_interval: 5s
    scrape_timeout: 3s
    static_configs:
      - targets: ["lidar-scanner.local:8080"]
        labels:
          host: "rpi5"
    metrics_path: "/metrics"
