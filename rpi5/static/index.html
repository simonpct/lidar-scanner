<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LiDAR Scanner</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #71717a;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --blue: #3b82f6;
    --accent: #8b5cf6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; padding: 16px;
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  h1 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
  }
  .card.full { grid-column: 1 / -1; }
  .card h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 8px; }
  .card .value { font-size: 1.5rem; font-weight: 700; }
  .card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

  .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink: 0; }
  .status-dot.ok { background: var(--green); }
  .status-dot.warn { background: var(--orange); }
  .status-dot.off { background: var(--red); }

  .net-row { display: flex; align-items: center; margin-bottom: 6px; font-size: 0.9rem; }
  .net-row:last-child { margin-bottom: 0; }
  .net-label { color: var(--muted); min-width: 50px; font-size: 0.75rem; font-family: monospace; }
  .net-info { flex: 1; }

  /* Bar de stockage */
  .bar-bg { background: var(--border); border-radius: 6px; height: 8px; margin-top: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s; }

  /* Section scan */
  .scan-section { margin-bottom: 16px; }
  .scan-form { display: flex; flex-direction: column; gap: 10px; }
  .input-row { display: flex; gap: 8px; }
  .input-row input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; color: var(--text);
    font-size: 0.95rem;
  }
  .input-row input:focus { outline: none; border-color: var(--accent); }
  .input-row input::placeholder { color: var(--muted); }

  .btn {
    padding: 12px 20px; border: none; border-radius: 10px;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-start { background: var(--green); color: #000; width: 100%; }
  .btn-stop { background: var(--red); color: #fff; width: 100%; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Boutons LiDAR */
  .btn-lidar {
    padding: 8px 14px; border-radius: 8px; font-size: 0.85rem;
    background: var(--green); color: #000;
  }
  .btn-lidar-warn { background: var(--red); color: #fff; }
  .btn-lidar-muted { background: var(--border); color: var(--text); }

  /* Scan en cours */
  .scan-active {
    background: linear-gradient(135deg, #1a2e1a, #1a1d27);
    border-color: var(--green);
  }
  .scan-active .pulse {
    display: inline-block; width: 10px; height: 10px;
    background: var(--green); border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Logs */
  .log-details { margin-top: 10px; }
  .log-details summary {
    font-size: 0.75rem; color: var(--muted); cursor: pointer;
    padding: 4px 0; user-select: none;
  }
  .log-box {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; margin-top: 6px;
    max-height: 150px; overflow-y: auto;
    font-family: monospace; font-size: 0.75rem; color: var(--muted);
    line-height: 1.5;
  }

  /* Sessions list */
  .sessions { margin-top: 8px; }
  .session-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .session-item:last-child { border-bottom: none; }
  .session-name { font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .session-meta { color: var(--muted); font-size: 0.75rem; text-align: right; }
  .btn-del {
    width: 20px; height: 20px; border-radius: 4px; border: none;
    background: var(--red); color: #fff; font-size: 0.75rem;
    cursor: pointer; line-height: 1; padding: 0; flex-shrink: 0;
  }
  .btn-view {
    padding: 2px 8px; border-radius: 4px; border: none;
    background: var(--border); color: var(--muted); font-size: 0.7rem;
    cursor: pointer; flex-shrink: 0;
  }
  .btn-view:active { background: var(--accent); color: #fff; }

  /* Responsive — single col on very small */
  @media (max-width: 360px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1><span class="dot" id="alive-dot"></span> LiDAR Scanner</h1>

<div class="grid">
  <!-- Stockage -->
  <div class="card">
    <h2>Stockage</h2>
    <div class="value" id="storage-free">--</div>
    <div class="sub" id="storage-detail">-- / --</div>
    <div class="bar-bg"><div class="bar-fill" id="storage-bar" style="width:0%; background:var(--green);"></div></div>
  </div>

  <!-- Température + Batterie -->
  <div class="card">
    <h2>CPU</h2>
    <div class="value" id="cpu-temp">--</div>
    <div class="sub" id="battery-info"></div>
  </div>

  <!-- Réseau -->
  <div class="card full">
    <h2>Réseau</h2>
    <div class="net-row">
      <span class="status-dot off" id="eth0-dot"></span>
      <span class="net-label">eth0</span>
      <span class="net-info" id="eth0-info">--</span>
    </div>
    <div class="net-row">
      <span class="status-dot off" id="lidar-dot"></span>
      <span class="net-label">lidar</span>
      <span class="net-info" id="lidar-info">--</span>
    </div>
    <div class="net-row">
      <span class="status-dot off" id="topic-dot"></span>
      <span class="net-label">points</span>
      <span class="net-info" id="topic-info">--</span>
    </div>
    <div class="net-row">
      <span class="status-dot off" id="slam-dot"></span>
      <span class="net-label">SLAM</span>
      <span class="net-info" id="slam-info">--</span>
    </div>
    <div class="net-row">
      <span class="status-dot off" id="wlan0-dot"></span>
      <span class="net-label">wlan0</span>
      <span class="net-info" id="wlan0-info">--</span>
    </div>
    <div class="net-row">
      <span class="status-dot off" id="ap0-dot"></span>
      <span class="net-label">ap0</span>
      <span class="net-info" id="ap0-info">--</span>
    </div>
  </div>

  <!-- Contrôle LiDAR direct -->
  <div class="card full" id="lidar-controls">
    <h2>Contrôle LiDAR</h2>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <button class="btn btn-lidar" onclick="lidarCmd('start')">Démarrer</button>
      <button class="btn btn-lidar btn-lidar-warn" onclick="lidarCmd('stop')">Arrêter</button>
      <button class="btn btn-lidar btn-lidar-muted" onclick="lidarCmd('reset')">Reset</button>
      <button class="btn btn-lidar btn-lidar-muted" onclick="lidarCmd('sync')">Sync horloge</button>
    </div>
    <div class="sub" id="lidar-cmd-status" style="margin-top:8px;"></div>
  </div>
</div>

<!-- Scan controls -->
<div class="card scan-section" id="scan-card">
  <h2>Scanner</h2>
  <div id="scan-idle">
    <div class="scan-form">
      <div class="input-row">
        <input type="text" id="scan-name" placeholder="Nom du scan (ex: batiment_01)">
      </div>
      <div class="input-row" style="align-items:center;">
        <input type="number" id="scan-interval" value="2" min="1" max="30" step="0.5"
               style="max-width: 80px;" title="Intervalle photos (s)">
        <label style="display:flex; align-items:center; gap:6px; font-size:0.85rem; cursor:pointer; white-space:nowrap;">
          <input type="checkbox" id="scan-gopro" checked style="width:18px; height:18px; accent-color:var(--accent);"> GoPro
        </label>
        <label style="display:flex; align-items:center; gap:6px; font-size:0.85rem; cursor:pointer; white-space:nowrap;">
          <input type="checkbox" id="scan-slam" checked style="width:18px; height:18px; accent-color:var(--green);"> SLAM
        </label>
      </div>
      <button class="btn btn-start" id="btn-start" onclick="startScan()">Lancer le scan</button>
    </div>
  </div>
  <div id="scan-running" style="display:none;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
      <span class="pulse"></span>
      <span style="font-weight:600;" id="scan-running-name">--</span>
    </div>
    <div class="sub" id="scan-running-since">--</div>
    <div style="display:flex; gap:8px; margin-top:10px;">
      <button class="btn btn-pause" id="btn-pause" onclick="togglePause()" style="flex:1; background:var(--orange); color:#000;">Pause</button>
      <button class="btn btn-stop" onclick="stopScan()" style="flex:1;">Arrêter</button>
    </div>
    <details class="log-details">
      <summary>Logs</summary>
      <div class="log-box" id="scan-logs"></div>
    </details>
  </div>
</div>

<!-- Snapshot point cloud -->
<div class="card" id="snapshot-card">
  <h2>Vue LiDAR</h2>
  <div id="snapshot-container" style="text-align:center;">
    <img id="snapshot-img" style="display:none; width:100%; border-radius:8px; border:1px solid var(--border);">
    <div class="sub" id="snapshot-placeholder">Appuyer pour capturer une vue</div>
  </div>
  <button class="btn btn-lidar-muted" onclick="takeSnapshot()" id="btn-snapshot" style="width:100%; margin-top:10px;">Snapshot</button>
  <div class="sub" id="snapshot-status" style="margin-top:6px;"></div>
</div>

<!-- Dernier scan (logs persistants) -->
<div class="card" id="last-scan-card" style="display:none;">
  <h2>Dernier scan</h2>
  <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
    <span class="status-dot" id="last-scan-dot"></span>
    <span style="font-weight:600;" id="last-scan-name">--</span>
    <span class="sub" id="last-scan-status" style="margin-left:auto;"></span>
  </div>
  <details class="log-details">
    <summary>Logs</summary>
    <div class="log-box" id="last-scan-logs" style="max-height:200px;"></div>
  </details>
</div>

<!-- Sessions passées -->
<div class="card">
  <h2>Sessions</h2>
  <div id="session-preview" style="display:none; margin-bottom:10px; text-align:center;">
    <img id="session-preview-img" style="width:100%; border-radius:8px; border:1px solid var(--border);">
    <div class="sub" id="session-preview-name" style="margin-top:4px;"></div>
  </div>
  <div class="sessions" id="sessions-list">
    <div class="sub">Aucune session</div>
  </div>
</div>

<script>
const $ = s => document.getElementById(s);

async function fetchStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    updateUI(d);
    $('alive-dot').style.background = 'var(--green)';
  } catch {
    $('alive-dot').style.background = 'var(--red)';
  }
}

function updateUI(d) {
  // Storage
  const s = d.storage;
  $('storage-free').textContent = s.free_gb + ' Go';
  $('storage-detail').textContent = s.used_gb + ' / ' + s.total_gb + ' Go — scans: ' + s.scans_gb + ' Go';
  $('storage-bar').style.width = s.percent + '%';
  $('storage-bar').style.background = s.percent > 90 ? 'var(--red)' : s.percent > 75 ? 'var(--orange)' : 'var(--green)';

  // CPU temp
  $('cpu-temp').textContent = d.cpu_temp !== null ? d.cpu_temp + '°C' : '--';
  if (d.cpu_temp > 75) $('cpu-temp').style.color = 'var(--red)';
  else if (d.cpu_temp > 60) $('cpu-temp').style.color = 'var(--orange)';
  else $('cpu-temp').style.color = 'var(--text)';

  // Battery
  if (d.battery) {
    $('battery-info').textContent = 'Batterie: ' + d.battery.percent + '% — ' + (d.battery.status || '');
  } else {
    $('battery-info').textContent = 'Secteur';
  }

  // Network
  updateNet('eth0', d.network.eth0);
  updateLidar(d.network.lidar_connected);
  updateTopic(d.network.lidar_topic);
  updateSlam(d.network.slam_topic);
  updateWlan(d.network.wlan0);
  updateAp(d.network.ap0);

  // Scan state
  if (d.scan.running) {
    $('scan-idle').style.display = 'none';
    $('scan-running').style.display = 'block';
    $('scan-running-name').textContent = d.scan.name;
    $('scan-running-since').textContent = 'Depuis ' + new Date(d.scan.started_at).toLocaleTimeString('fr-FR');
    $('scan-card').classList.add('scan-active');
    // Pause button state
    const pauseBtn = $('btn-pause');
    if (d.scan.paused) {
      pauseBtn.textContent = 'Reprendre';
      pauseBtn.style.background = 'var(--blue)';
      pauseBtn.style.color = '#fff';
    } else {
      pauseBtn.textContent = 'Pause';
      pauseBtn.style.background = 'var(--orange)';
      pauseBtn.style.color = '#000';
    }
    isPaused = d.scan.paused;
    $('lidar-controls').style.display = 'none';
    fetchLogs();
  } else {
    isPaused = false;
    $('scan-idle').style.display = 'block';
    $('scan-running').style.display = 'none';
    $('scan-card').classList.remove('scan-active');
    $('lidar-controls').style.display = 'block';
  }

  // Dernier scan (logs persistants même après arrêt)
  if (!d.scan.running && d.scan.last_logs && d.scan.last_logs.length > 0) {
    $('last-scan-card').style.display = 'block';
    $('last-scan-name').textContent = d.scan.name || '?';
    const dot = $('last-scan-dot');
    const statusEl = $('last-scan-status');
    if (d.scan.exit_code === 0) {
      dot.className = 'status-dot ok';
      statusEl.textContent = 'OK';
    } else if (d.scan.exit_code !== null) {
      dot.className = 'status-dot off';
      statusEl.textContent = 'Erreur (code ' + d.scan.exit_code + ')';
    } else {
      dot.className = 'status-dot warn';
      statusEl.textContent = '';
    }
    const box = $('last-scan-logs');
    box.textContent = d.scan.last_logs.join('\n');
  } else if (d.scan.running) {
    $('last-scan-card').style.display = 'none';
  }

  // Sessions
  const list = $('sessions-list');
  if (d.sessions.length === 0) {
    list.innerHTML = '<div class="sub">Aucune session</div>';
  } else {
    list.innerHTML = d.sessions.map(s => {
      const dur = s.duration ? Math.round(s.duration) + 's' : '';
      const photos = s.photos !== undefined ? s.photos + ' photos' : '';
      const lidar = s.lidar_mb ? s.lidar_mb + ' Mo LiDAR' : 'pas de données LiDAR';
      const meta = [dur, photos, lidar, s.size_mb + ' Mo total'].filter(Boolean).join(' · ');
      const del = s.empty ? `<button class="btn-del" onclick="deleteSession('${s.name}')">×</button>` : '';
      const view = s.lidar_mb > 0 ? `<button class="btn-view" onclick="viewSession('${s.name}')">vue</button>` : '';
      return `<div class="session-item"><span class="session-name">${s.name} ${view} ${del}</span><span class="session-meta">${meta}</span></div>`;
    }).join('');
  }
}

function updateNet(id, info) {
  const dot = $(id + '-dot');
  const el = $(id + '-info');
  if (!info.exists) { dot.className = 'status-dot off'; el.textContent = 'absent'; return; }
  dot.className = info.up ? 'status-dot ok' : 'status-dot off';
  el.textContent = info.up ? (info.ip || 'pas d\'IP') : 'déconnecté';
}

function updateLidar(reachable) {
  $('lidar-dot').className = reachable ? 'status-dot ok' : 'status-dot off';
  $('lidar-info').textContent = reachable ? 'Unitree L2 (câble OK)' : 'câble non détecté';
}

function updateTopic(info) {
  const dot = $('topic-dot');
  const el = $('topic-info');
  if (!info || info.error) { dot.className = 'status-dot off'; el.textContent = 'ROS2 indisponible'; return; }
  dot.className = info.active ? 'status-dot ok' : 'status-dot off';
  el.textContent = info.active ? 'driver actif (' + info.publishers + ' pub)' : 'driver inactif';
}

function updateSlam(info) {
  const dot = $('slam-dot');
  const el = $('slam-info');
  if (!info) { dot.className = 'status-dot off'; el.textContent = 'non disponible'; return; }
  dot.className = info.active ? 'status-dot ok' : 'status-dot off';
  el.textContent = info.active ? 'FAST-LIO2 actif' : 'inactif';
}

function updateWlan(info) {
  const dot = $('wlan0-dot');
  const el = $('wlan0-info');
  if (!info.exists) { dot.className = 'status-dot off'; el.textContent = 'absent'; return; }
  dot.className = info.up ? 'status-dot ok' : 'status-dot off';
  if (info.up && info.ssid) {
    el.textContent = info.ssid + ' (' + (info.ip || '...') + ')';
  } else if (info.up) {
    el.textContent = info.ip || 'connecté';
  } else {
    el.textContent = 'déconnecté';
  }
}

function updateAp(info) {
  const dot = $('ap0-dot');
  const el = $('ap0-info');
  if (!info.exists) { dot.className = 'status-dot off'; el.textContent = 'non configuré'; return; }
  dot.className = info.up ? 'status-dot ok' : 'status-dot off';
  el.textContent = info.up ? 'LidarScanner (' + (info.ip || '192.168.4.1') + ')' : 'inactif';
}

async function takeSnapshot() {
  const btn = $('btn-snapshot');
  const status = $('snapshot-status');
  btn.disabled = true;
  status.textContent = 'Capture en cours...';
  try {
    const r = await fetch('/api/snapshot');
    if (r.headers.get('content-type')?.includes('image/png')) {
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const img = $('snapshot-img');
      img.src = url;
      img.style.display = 'block';
      $('snapshot-placeholder').style.display = 'none';
      status.textContent = new Date().toLocaleTimeString('fr-FR');
    } else {
      const d = await r.json();
      status.textContent = d.error || 'Erreur';
    }
  } catch (e) {
    status.textContent = 'Erreur: ' + e.message;
  }
  btn.disabled = false;
}

async function viewSession(name) {
  const preview = $('session-preview');
  const img = $('session-preview-img');
  const label = $('session-preview-name');
  label.textContent = name + ' — chargement...';
  preview.style.display = 'block';
  try {
    const r = await fetch('/api/sessions/' + name + '/snapshot');
    if (r.headers.get('content-type')?.includes('image/png')) {
      const blob = await r.blob();
      img.src = URL.createObjectURL(blob);
      label.textContent = name;
    } else {
      const d = await r.json();
      label.textContent = name + ' — ' + (d.error || 'erreur');
      preview.style.display = 'none';
    }
  } catch (e) {
    label.textContent = 'Erreur: ' + e.message;
  }
}

async function deleteSession(name) {
  if (!confirm('Supprimer la session "' + name + '" ?')) return;
  try {
    await fetch('/api/sessions/' + name, { method: 'DELETE' });
  } catch (e) {
    alert('Erreur: ' + e.message);
  }
  fetchStatus();
}

async function lidarCmd(cmd) {
  const statusEl = $('lidar-cmd-status');
  statusEl.textContent = cmd + '...';
  try {
    const r = await fetch('/api/lidar/' + cmd, { method: 'POST' });
    const d = await r.json();
    statusEl.textContent = d.ok ? d.message : ('Erreur: ' + d.message);
    setTimeout(() => { statusEl.textContent = ''; }, 4000);
  } catch (e) {
    statusEl.textContent = 'Erreur: ' + e.message;
  }
  fetchStatus();
}

async function startScan() {
  const name = $('scan-name').value.trim() || undefined;
  const interval = parseFloat($('scan-interval').value) || 2;
  const gopro = $('scan-gopro').checked;
  const slam = $('scan-slam').checked;
  $('btn-start').disabled = true;
  try {
    const r = await fetch('/api/scan/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name, interval, gopro, slam })
    });
    const d = await r.json();
    if (d.error) alert(d.error);
  } catch (e) {
    alert('Erreur: ' + e.message);
  }
  $('btn-start').disabled = false;
  fetchStatus();
}

let isPaused = false;
async function togglePause() {
  const endpoint = isPaused ? '/api/scan/resume' : '/api/scan/pause';
  try {
    const r = await fetch(endpoint, { method: 'POST' });
    const d = await r.json();
    if (d.error) alert(d.error);
    else isPaused = !isPaused;
  } catch (e) {
    alert('Erreur: ' + e.message);
  }
  fetchStatus();
}

async function stopScan() {
  try {
    await fetch('/api/scan/stop', { method: 'POST' });
  } catch (e) {
    alert('Erreur: ' + e.message);
  }
  setTimeout(fetchStatus, 1000);
}

async function fetchLogs() {
  try {
    const r = await fetch('/api/scan/logs');
    const d = await r.json();
    const box = $('scan-logs');
    box.textContent = d.lines.join('\n');
    box.scrollTop = box.scrollHeight;
  } catch {}
}

// Polling
fetchStatus();
setInterval(fetchStatus, 2000);
</script>
</body>
</html>
